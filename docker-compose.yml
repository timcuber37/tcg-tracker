# PokéCollect — full stack compose
# Postgres is hosted on Supabase — no local postgres service needed.
# Required secrets in .env: MYSQL_PASSWORD, POSTGRES_DSN, SUPABASE_URL, SUPABASE_KEY,
#                           FLASK_SECRET_KEY, POKEWALLET_API_KEY

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-pokemon_tcg}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [pokecollect]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks: [pokecollect]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks: [pokecollect]

  cassandra:
    image: cassandra:4
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: pokecollect
      CASSANDRA_DC: datacenter1
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [pokecollect]

  # One-shot container: applies the Cassandra keyspace + table schema.
  # Uses IF NOT EXISTS guards so it is safe to re-run on every `docker compose up`.
  cassandra-init:
    image: cassandra:4
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./db/cassandra_schema.cql:/schema.cql:ro
    entrypoint: ["/bin/bash", "-c",
      "until cqlsh cassandra -f /schema.cql; do echo 'CQL not ready, retrying...'; sleep 5; done"]
    networks: [pokecollect]

  # ── App services (all built from the same Dockerfile) ──────────────────────

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
      FLASK_DEBUG: "false"
    volumes:
      - card_images:/app/static/cards
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks: [pokecollect]

  cassandra-consumer:
    build: .
    command: python -m consumers.cassandra_consumer
    restart: unless-stopped
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks: [pokecollect]

  sync:
    build: .
    command: python -m sync.api_sync
    restart: unless-stopped
    env_file: .env
    environment:
      CASSANDRA_HOSTS: cassandra
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
    networks: [pokecollect]

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  mysql_data:
  cassandra_data:
  kafka_data:
  zookeeper_data:
  card_images:

# ── Network ──────────────────────────────────────────────────────────────────

networks:
  pokecollect:
    driver: bridge
