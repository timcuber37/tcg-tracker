# TCGTracker — Java/Spring backend + React (nginx) frontend.
# Postgres is hosted on Supabase. One backend image runs as three roles
# (web / consumer / sync) selected by SPRING_PROFILES_ACTIVE.
#
# Required in root .env (used both as container env and for compose substitution):
#   MYSQL_PASSWORD, POSTGRES_DSN, SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_KEY, POKEWALLET_API_KEY

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-pokemon_tcg}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [tcgtracker]

  # Kafka + Zookeeper hold only transient event-bus state (the read models in
  # Cassandra and the MySQL source of truth persist). Their data is intentionally
  # NOT persisted to a volume — persisting only part of Zookeeper's state across
  # restarts causes Kafka's InconsistentClusterIdException.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [tcgtracker]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks: [tcgtracker]

  cassandra:
    image: cassandra:4
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: tcgtracker
      CASSANDRA_DC: datacenter1
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [tcgtracker]

  # One-shot: apply the Cassandra keyspace + tables (IF NOT EXISTS, safe to re-run).
  cassandra-init:
    image: cassandra:4
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./db/cassandra_schema.cql:/schema.cql:ro
    entrypoint: ["/bin/bash", "-c",
      "until cqlsh cassandra -f /schema.cql; do echo 'CQL not ready, retrying...'; sleep 5; done"]
    networks: [tcgtracker]

  # ── Observability (Micrometer → InfluxDB → Grafana) ────────────────────────

  # InfluxDB 1.8: Micrometer's Influx registry pushes line-protocol to /write?db=…
  # (v1 API — no token/org/bucket needed). Auth disabled for a local dev stack.
  influxdb:
    image: influxdb:1.8
    restart: unless-stopped
    environment:
      INFLUXDB_DB: ${INFLUX_DB:-tcgtracker}
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    ports:
      - "8086:8086"
    networks: [tcgtracker]

  # Grafana, pre-provisioned with the InfluxDB datasource + the TCGTracker dashboard
  # (committed under ./observability) so it comes up populated. Host port 3001 to
  # avoid clashing with the frontend on 3000.
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks: [tcgtracker]

  # ── Backend (one image, three roles) ───────────────────────────────────────

  web:
    build: ./backend
    image: tcgtracker-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: web
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
      IMAGE_CACHE_DIR: /app/static/cards
      INFLUX_ENABLED: "true"
      INFLUX_URI: http://influxdb:8086
    volumes:
      - card_images:/app/static/cards
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks: [tcgtracker]

  consumer:
    image: tcgtracker-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: consumer
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
      INFLUX_ENABLED: "true"
      INFLUX_URI: http://influxdb:8086
    depends_on:
      web:
        condition: service_started
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks: [tcgtracker]

  sync:
    image: tcgtracker-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: sync
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
      INFLUX_ENABLED: "true"
      INFLUX_URI: http://influxdb:8086
    depends_on:
      web:
        condition: service_started
      cassandra-init:
        condition: service_completed_successfully
    networks: [tcgtracker]

  # ── Frontend (nginx serving the SPA + proxying to web) ─────────────────────

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - web
    networks: [tcgtracker]

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  mysql_data:
  cassandra_data:
  card_images:       # persists the /card-image proxy cache across restarts
  influxdb_data:     # metrics time-series
  grafana_data:      # Grafana state (dashboards provisioned read-only from ./observability)

# ── Network ──────────────────────────────────────────────────────────────────

networks:
  tcgtracker:
    driver: bridge
