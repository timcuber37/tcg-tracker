# PokéCollect — Java/Spring backend + React (nginx) frontend.
# Postgres is hosted on Supabase. One backend image runs as three roles
# (web / consumer / sync) selected by SPRING_PROFILES_ACTIVE.
#
# Required in root .env (used both as container env and for compose substitution):
#   MYSQL_PASSWORD, POSTGRES_DSN, SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_KEY, POKEWALLET_API_KEY

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-pokemon_tcg}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [pokecollect]

  # Kafka + Zookeeper hold only transient event-bus state (the read models in
  # Cassandra and the MySQL source of truth persist). Their data is intentionally
  # NOT persisted to a volume — persisting only part of Zookeeper's state across
  # restarts causes Kafka's InconsistentClusterIdException.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [pokecollect]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks: [pokecollect]

  cassandra:
    image: cassandra:4
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: pokecollect
      CASSANDRA_DC: datacenter1
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [pokecollect]

  # One-shot: apply the Cassandra keyspace + tables (IF NOT EXISTS, safe to re-run).
  cassandra-init:
    image: cassandra:4
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./db/cassandra_schema.cql:/schema.cql:ro
    entrypoint: ["/bin/bash", "-c",
      "until cqlsh cassandra -f /schema.cql; do echo 'CQL not ready, retrying...'; sleep 5; done"]
    networks: [pokecollect]

  # ── Backend (one image, three roles) ───────────────────────────────────────

  web:
    build: ./backend
    image: pokecollect-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: web
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
      IMAGE_CACHE_DIR: /app/static/cards
    volumes:
      - card_images:/app/static/cards
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks: [pokecollect]

  consumer:
    image: pokecollect-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: consumer
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
    depends_on:
      web:
        condition: service_started
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks: [pokecollect]

  sync:
    image: pokecollect-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: sync
      MYSQL_HOST: mysql
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
    depends_on:
      web:
        condition: service_started
      cassandra-init:
        condition: service_completed_successfully
    networks: [pokecollect]

  # ── Frontend (nginx serving the SPA + proxying to web) ─────────────────────

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - web
    networks: [pokecollect]

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  mysql_data:
  cassandra_data:
  card_images:       # persists the /card-image proxy cache across restarts

# ── Network ──────────────────────────────────────────────────────────────────

networks:
  pokecollect:
    driver: bridge
