# Loads every dashboard JSON committed under ./observability/grafana/dashboards
# (mounted read-only at /var/lib/grafana/dashboards) on startup.
apiVersion: 1

providers:
  - name: TCGTracker
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
